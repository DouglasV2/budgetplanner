services:
  backend:
    image: maven:3.9-eclipse-temurin-17
    container_name: budgetspace-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - maven_repo:/root/.m2
    command: mvn spring-boot:run
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/budgetspace
      DATABASE_USERNAME: budgetspace
      DATABASE_PASSWORD: budgetspace
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: budgetspace-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install --registry=https://registry.npmjs.org --include=dev --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  maven_repo:
  frontend_node_modules: