services:
  backend:
    image: maven:3.9-eclipse-temurin-17
    container_name: budgetspace-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - maven_repo:/root/.m2
    command: mvn spring-boot:run
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/budgetspace
      DATABASE_USERNAME: budgetspace
      DATABASE_PASSWORD: budgetspace
      # Allow both the old (5173) and the new (5180) frontend port so the browser Origin matches.
      CORS_ALLOWED_ORIGINS: http://localhost:5180,http://127.0.0.1:5180,http://localhost:5173,http://127.0.0.1:5173
      # Sprint 10.63: the PUBLIC Google OAuth Web client id (the audience the backend checks on each ID token).
      # Value-free here on purpose — supplied via the gitignored root .env. Blank → Google sign-in is dormant
      # (guest-only, no fake auth). No client secret is needed (we verify the ID token, not the code flow).
      BUDGETSPACE_GOOGLE_CLIENTID: ${BUDGETSPACE_GOOGLE_CLIENTID:-}
      # Session cookie SameSite (default Lax = same-domain dev). Set None to exercise the split-host path
      # locally (None forces Secure on; browsers then only send it over HTTPS). See DEPLOY.md §3.
      BUDGETSPACE_AUTH_COOKIE_SAMESITE: ${BUDGETSPACE_AUTH_COOKIE_SAMESITE:-Lax}
      # Sprint 10.64: eBay Browse API (live "Rabljeno", no DB persistence). Value-free here — App ID + the SECRET
      # Cert ID come from the gitignored root .env. Blank → eBay source dormant (no used items, no network call).
      BUDGETSPACE_MARKETPLACEFEEDS_EBAY_CLIENTID: ${BUDGETSPACE_MARKETPLACEFEEDS_EBAY_CLIENTID:-}
      BUDGETSPACE_MARKETPLACEFEEDS_EBAY_CLIENTSECRET: ${BUDGETSPACE_MARKETPLACEFEEDS_EBAY_CLIENTSECRET:-}
      # Sprint 10.66: AI (Gemini) — cheapest provider + free tier; the "Plus" carrot (smart prompt understanding
      # + design rationale). OFF by default; flip on via the gitignored .env (BUDGETSPACE_AI_ENABLED=true,
      # BUDGETSPACE_LLM_PROVIDER=gemini, GEMINI_API_KEY=...). Hard-capped by AiUsageTracker; rule-based fallback on
      # any failure. The key is backend-only, never committed.
      BUDGETSPACE_AI_ENABLED: ${BUDGETSPACE_AI_ENABLED:-false}
      BUDGETSPACE_LLM_PROVIDER: ${BUDGETSPACE_LLM_PROVIDER:-off}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # AI spend guardrails (AiUsageTracker). Monthly USD is the HARD cap; per-day/session prevent runaway loops.
      # Defaults are safe; tuned via .env (tight monthly cap + generous per-day/session for prompt testing).
      BUDGETSPACE_AI_MONTHLY_BUDGET_USD: ${BUDGETSPACE_AI_MONTHLY_BUDGET_USD:-20}
      BUDGETSPACE_AI_MAX_REQUESTS_PER_DAY: ${BUDGETSPACE_AI_MAX_REQUESTS_PER_DAY:-100}
      BUDGETSPACE_AI_MAX_REQUESTS_PER_SESSION: ${BUDGETSPACE_AI_MAX_REQUESTS_PER_SESSION:-10}
      # Sprint 10.69: Stripe (TEST). Secret key is backend-only (from the gitignored .env, value-free here).
      # Blank → billing dormant (the Plus CTA falls back to the waitlist). Webhook secret optional in dev.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_PLUS_PRICE_ID: ${STRIPE_PLUS_PRICE_ID:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Sprint 10.96: Sentry error alerting. Blank SENTRY_DSN => Sentry disabled (dev logs to console as before).
      # Set it in the gitignored root .env to test alerting locally; SENTRY_DEBUG=true prints send traces.
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-dev}
      SENTRY_DEBUG: ${SENTRY_DEBUG:-false}
      # Sprint 10.103: show the Plus/pricing surface in DEV so it can still be developed; prod defaults to false
      # (free beta hides it). Set to false here too if you want to preview the beta (hidden-Plus) experience.
      BUDGETSPACE_PLUS_ENABLED: ${BUDGETSPACE_PLUS_ENABLED:-true}
      # Spring Boot DevTools auto-restart loops under a Docker bind mount (it watches target/classes,
      # which mvn spring-boot:run itself rewrites) → the backend kept restarting and requests in that
      # window failed with ERR_EMPTY_RESPONSE / "no Access-Control-Allow-Origin" in the browser. Keep
      # LiveReload but turn off the restart loop; restart the container manually to pick up code changes.
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    # Expose the backend on host port 8090 (container still serves on 8080). 8080 is a commonly
    # occupied port; 8090 keeps the API on a clean, predictable port. The browser calls :8090.
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: budgetspace-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    # Serve on 5180 (host and container) to avoid a stale process already holding 5173 on Windows.
    command: sh -c "npm install --registry=https://registry.npmjs.org --include=dev --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5180"
    environment:
      # Must match the backend's host port above (8090); this is the URL the browser calls.
      VITE_API_BASE_URL: http://localhost:8090
    ports:
      - "5180:5180"
    depends_on:
      - backend

volumes:
  maven_repo:
  frontend_node_modules: