spring:
  application:
    name: budgetspace-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/budgetspace}
    username: ${DATABASE_USERNAME:budgetspace}
    password: ${DATABASE_PASSWORD:budgetspace}
  jpa:
    hibernate:
      # Overridable via env (HIBERNATE_DDL_AUTO). Default 'create' keeps the dev/pilot flow where
      # the schema is rebuilt and data.sql + RealCatalogSeeder repopulate it on each start.
      ddl-auto: ${HIBERNATE_DDL_AUTO:create}
    defer-datasource-initialization: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

budgetspace:
  real-catalog:
    # Seed the real IKEA/JYSK living-room catalog on startup (env BUDGETSPACE_REAL_CATALOG_SEED_ENABLED).
    seed-enabled: ${BUDGETSPACE_REAL_CATALOG_SEED_ENABLED:true}
  admin-endpoints:
    # Dev/collector/import/admin endpoints. Public in dev; disable in prod (env BUDGETSPACE_ADMIN_ENDPOINTS_ENABLED=false).
    # The 'prod' Spring profile (SPRING_PROFILES_ACTIVE=prod) turns these off automatically.
    enabled: ${BUDGETSPACE_ADMIN_ENDPOINTS_ENABLED:true}
