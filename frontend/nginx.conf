# ── noindex for shared plans (/plan/<id>) ──────────────────────────────────────────────────────────────────
# Shared-plan links stay reachable by anyone who has the URL, but must never be indexed. The value keys off
# $request_uri — the ORIGINAL request line — which, unlike $uri, is NOT rewritten by the try_files internal
# redirect to /index.html. So the tag lands on the FINAL response for the /plan/:id request (served by the SPA
# fallback = /index.html below), not on a location that the internal redirect then discards. It's empty for every
# other URL, and nginx skips an add_header whose value is an empty string — so the homepage and the SEO landing
# pages stay fully indexable. This `map` must live in the http context; this file is included there
# (COPY nginx.conf → /etc/nginx/conf.d/default.conf), so it sits OUTSIDE the server block, above it.
map $request_uri $robots_tag {
    default        "";
    ~^/plan/[^/?]+ "noindex, nofollow, noarchive";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip the text assets (JS/CSS/JSON/SVG) — cheap win for a SPA bundle.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;

    # ── Security headers (GDPR Art. 32 technical measures) ──────────────────────────────────────────
    # The Spring SecurityHeadersFilter only decorates /api responses on the backend origin; this nginx
    # container serves the actual document + JS the browser renders (and that holds the Google session),
    # so the headers must be set HERE too. NOTE: nginx does NOT inherit `add_header` into a location that
    # declares its own `add_header` — so these are repeated in the /assets/ and =/index.html blocks below.
    # Keep the copies in sync (including X-Robots-Tag). CSP: script-src is 'self' + www.googletagmanager.com —
    # the latter is the ONLY external script host, loaded solely by the consent layer AFTER the visitor accepts
    # analytics (Sprint 10.185); the Vite build itself emits only content-hashed same-origin modules, and the
    # static SEO landing pages carry no inline <script> either. The GA collection beacon (google-analytics.com) is
    # already permitted by connect-src/img-src's `https:`. Google Fonts are allow-listed until self-hosted; img-src
    # allows any https host because product images load from ~50 retailer CDNs + eBay. Tighten connect-src to the
    # exact API origin for a same-origin deploy.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:" always;
    # Empty for everything except /plan/<id> (nginx omits an empty-valued header). Inherited by `location /`
    # (which declares no add_header of its own), so the homepage + SEO pages are covered here.
    add_header X-Robots-Tag $robots_tag always;

    # SPA routing: any path that isn't a real file falls back to index.html. Real files (the SEO landing pages
    # under /hr/**, sitemap.xml, robots.txt, seo.css, favicon.svg) are served directly by this block, inheriting
    # the security headers above; a directory without a trailing slash (e.g. /hr/opremanje-prvog-stana) is served
    # from its index.html via the $uri/ probe — same page, no redirect loop.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints assets (content hash in the name) → safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-declare security headers (this block's add_header suppresses inheritance).
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:" always;
        add_header X-Robots-Tag $robots_tag always;
    }

    # index.html must never be cached, so a deploy is picked up immediately. This block also serves the SPA
    # fallback (including /plan/:id after the try_files internal redirect), so the X-Robots-Tag added here is what
    # actually carries the shared-plan noindex on the final response.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        # Re-declare security headers (this block's add_header suppresses inheritance).
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:" always;
        add_header X-Robots-Tag $robots_tag always;
    }
}
