server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip the text assets (JS/CSS/JSON/SVG) — cheap win for a SPA bundle.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Security headers (GDPR Art. 32 technical measures) ──────────────────────────────────────────
    # The Spring SecurityHeadersFilter only decorates /api responses on the backend origin; this nginx
    # container serves the actual document + JS the browser renders (and that holds the Google session),
    # so the headers must be set HERE too. NOTE: nginx does NOT inherit `add_header` into a location that
    # declares its own `add_header` — so these are repeated in the /assets/ and =/index.html blocks below.
    # Keep the two copies in sync. CSP: script-src is 'self' + www.googletagmanager.com — the latter is the
    # ONLY external script host, and it is loaded solely by the consent layer AFTER the visitor accepts
    # analytics (Sprint 10.185); the Vite build itself emits only content-hashed same-origin modules, no inline
    # <script>. The GA collection beacon (google-analytics.com) is already permitted by connect-src/img-src's
    # `https:`. Google Fonts are allow-listed until self-hosted; img-src allows any https host because product
    # images load from ~50 retailer CDNs + eBay. Tighten connect-src to the exact API origin for a same-origin deploy.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:" always;

    # SPA routing: any path that isn't a real file falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints assets (content hash in the name) → safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-declare security headers (this block's add_header suppresses inheritance).
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:" always;
    }

    # index.html must never be cached, so a deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        # Re-declare security headers (this block's add_header suppresses inheritance).
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:" always;
    }
}
